name: CI/CD — Supabase + API

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/admin/**"
      - "apps/mobile/**"
      - "apps/web/**"
      - "supabase/**"
      - "packages/**"
      - "scripts/**"
      - "workers/**"
      - ".github/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_hiker_lookup:
        description: "Deploy only the hiker-lookup Edge Function"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "20"
  SUPABASE_PROJECT_REF: ${{ github.ref == 'refs/heads/main' && 'iosdoheblabfimkjnvfj' || 'xwblovggtvbpiusjfokq' }}
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # ── Lint & Typecheck ──────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run typecheck

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run db:generate
      - run: npm run build

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gonggu_wish_test
          POSTGRES_USER: gonggu
          POSTGRES_PASSWORD: gonggu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gonggu -d gonggu_wish_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci

      # Generate Prisma client
      - run: npm run db:generate

      # Run tests
      - run: npm test
        env:
          DATABASE_URL: postgresql://gonggu:gonggu@localhost:5432/gonggu_wish_test?schema=public
          JWT_SECRET: test-secret
          ADMIN_TOKEN: test-admin-token
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH || 'test-hash' }}

  # ── Edge Function Tests ──────────────────────────────────────────────────
  edge-tests:
    name: Edge Function Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.x
      - run: deno test --allow-net supabase/functions

  # ── Targeted Hiker Function Deploy ───────────────────────────────────────
  deploy-hiker-lookup:
    name: Deploy Hiker Edge Function
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    needs: [lint, build, test, edge-tests]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_hiker_lookup == true }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v1
        with:
          version: latest
      - run: supabase functions deploy hiker-lookup --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Dependency Review ────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high

  # ── Supabase DB Migrate ───────────────────────────────────────────────────
  supabase-db:
    name: Supabase DB Migration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    needs: [lint, build, test, edge-tests]
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' && needs.edge-tests.result == 'success' }}
    outputs:
      deployment_enabled: ${{ steps.credentials.outputs.deployment_enabled }}
    steps:
      - name: Check Supabase deployment credentials
        id: credentials
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" || -z "$SUPABASE_DB_PASSWORD" ]]; then
            echo "deployment_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Supabase deployment skipped because production credentials are not configured."
            {
              echo "## Supabase deployment skipped"
              echo ""
              echo "Set `SUPABASE_ACCESS_TOKEN` and `SUPABASE_DB_PASSWORD` in the production environment to enable migrations."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "deployment_enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.credentials.outputs.deployment_enabled == 'true'
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v1
        if: steps.credentials.outputs.deployment_enabled == 'true'
        with:
          version: latest

      # Link the project
      - run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        if: steps.credentials.outputs.deployment_enabled == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # The repository also restores legacy migrations that were omitted from
      # the Supabase folder while their schema already existed remotely. Allow
      # Supabase CLI to apply those historical files before newer remote rows.
      - run: supabase db push --include-all
        if: steps.credentials.outputs.deployment_enabled == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ── Supabase Functions Deploy ──────────────────────────────────────────────
  supabase-functions:
    name: Supabase Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    needs: [rls-audit]
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && needs.rls-audit.result == 'success' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v1
        with:
          version: latest

      # Deploy all Edge Functions
      - run: supabase functions deploy health --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy webhook-handler --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy admin-api --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy register-push-token --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy hiker-lookup --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy public-submission --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy refresh-instagram-media --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy seller-rankings --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy delete-account --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── RLS Policy Audit ─────────────────────────────────────────────────────
  rls-audit:
    name: RLS Policy Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [supabase-db]
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && needs.supabase-db.result == 'success' && needs.supabase-db.outputs.deployment_enabled == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v1
        with:
          version: latest
      - name: Link Supabase project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Diff migrations (check sync)
        run: supabase db diff --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Audit RLS policies
        run: |
          set -euo pipefail
          echo "Checking RLS policies are enabled on all public tables..."
          supabase db query "DO \$\$
          DECLARE
            unprotected_tables text;
          BEGIN
            SELECT string_agg(format('%I.%I', schemaname, tablename), ', ')
              INTO unprotected_tables
            FROM pg_tables
            WHERE schemaname = 'public'
              AND tablename NOT IN ('_prisma_migrations', 'schema_migrations')
              AND rowsecurity = false;

            IF unprotected_tables IS NOT NULL THEN
              RAISE EXCEPTION 'RLS disabled on: %', unprotected_tables;
            END IF;
          END
          \$\$;" --linked
          echo "RLS audit passed"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ── Admin Dashboard Deploy (Vercel) ──────────────────────────────────────
  deploy-admin:
    name: Deploy Admin Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    needs: [rls-audit]
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && needs.rls-audit.result == 'success' }}
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Check Vercel deployment credentials
        id: credentials
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ -z "$VERCEL_TOKEN" || -z "$VERCEL_ORG_ID" || -z "$VERCEL_PROJECT_ID" ]]; then
            echo "deployment_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel deployment skipped because production credentials are not configured."
            {
              echo "## Vercel deployment skipped"
              echo ""
              echo "Set `VERCEL_TOKEN`, `VERCEL_ORG_ID`, and `VERCEL_PROJECT_ID` in the production environment to enable deployment."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "deployment_enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.credentials.outputs.deployment_enabled == 'true'
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.credentials.outputs.deployment_enabled == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
        if: steps.credentials.outputs.deployment_enabled == 'true'
      - run: npm run build --workspace=@gonggu/admin
        if: steps.credentials.outputs.deployment_enabled == 'true'
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@de09aeac2ace6599ec9b11ef87558759a496bac4 # v42.3.0
        if: steps.credentials.outputs.deployment_enabled == 'true'
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: ./apps/admin

  # ── Cloudflare Worker Deploy ─────────────────────────────────────────────
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    needs: [lint, build, test, edge-tests]
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' && needs.edge-tests.result == 'success' }}
    defaults:
      run:
        working-directory: ./workers/api-proxy
    steps:
      - name: Check Cloudflare credentials
        id: credentials
        working-directory: .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "deployment_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare Worker deployment skipped because credentials are not configured."
            {
              echo "## Cloudflare Worker deployment skipped"
              echo ""
              echo "Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in the ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }} environment to enable deployment."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "deployment_enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.credentials.outputs.deployment_enabled == 'true'
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.credentials.outputs.deployment_enabled == 'true'
        with:
          node-version: "22"
      - name: Install Worker dependencies
        if: steps.credentials.outputs.deployment_enabled == 'true'
        run: npm ci
      - name: Deploy Worker
        if: steps.credentials.outputs.deployment_enabled == 'true'
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            npm run deploy:production
          else
            npm run deploy:staging
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
