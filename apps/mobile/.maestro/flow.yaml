appId: com.gonggu.wish
---
# Smoke flow -- app launches and home search entry is visible.
# Run: maestro test apps/mobile/.maestro/flow.yaml
# NOTE: canonical flows live in repo root .maestro/. This is a legacy smoke check.
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
- takeScreenshot: smoke-01-home