appId: com.gonggu.wish
---
# Deal detail screen E2E -- tap a deal card, verify detail, go back.
# Run: maestro test .maestro/detail-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# Scroll home to find a deal card
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
# Tap first deal card with 상세 보기 a11y label if present
- tapOn:
    id: "공구 상세 보기"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: detail-01-opened
# Scroll detail content
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- takeScreenshot: detail-02-scrolled
# Go back
- back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 10000
- takeScreenshot: detail-03-back-home