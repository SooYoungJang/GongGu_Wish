appId: com.gonggu.wish
---
# QA evidence: CalendarScreen filter states with screenshot cache fix

# Step 0: Fresh launch
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "공구캘린더"
    timeout: 30000

# Step 1: Dismiss any banners
- tapOn:
    point: "95%,95%"
- waitForAnimationToEnd

# Step 2: Navigate to CalendarScreen  
- tapOn: "전체 캘린더 보기"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "오늘로 이동"
    timeout: 15000
- waitForAnimationToEnd

# Step 3: Wait for filter chip a11y label to appear  
- extendedWaitUntil:
    visible: "팔로잉만 보기 비활성화"
    timeout: 10000

# Step 4: Screenshot — filter OFF
- takeScreenshot: 01-calendar-filter-off
- waitForAnimationToEnd

# Step 5: Tap filter chip via a11y label (precise match)
- tapOn: "팔로잉만 보기 비활성화"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Step 6: Screenshot — filter ON
- takeScreenshot: 02-calendar-filter-on
- waitForAnimationToEnd

# Step 7: Tap filter chip again to toggle back OFF
- tapOn:
    point: "88%,10%"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Step 8: Navigate to next month for visual distinction (different date range)
- swipe:
    start: 50%,50%
    end: 50%,25%
    duration: 100
- waitForAnimationToEnd
- waitForAnimationToEnd

# Step 9: Tap "다음 달" or swipe left on month header to change month
- swipe:
    start: 75%,15%
    end: 25%,15%
    duration: 200
- waitForAnimationToEnd
- waitForAnimationToEnd

# Step 10: Screenshot — filter OFF on DIFFERENT month
- takeScreenshot: 03-calendar-filter-off-again
