appId: com.gonggu.wish
---
# Store / ranking screen E2E -- verify ranking tab loads, scroll, search entry.
# Run: maestro test .maestro/store-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# Go to Ranking tab
- tapOn:
    id: "tab-Ranking"
- waitForAnimationToEnd
- assertVisible: "쇼핑몰 랭킹"
- takeScreenshot: store-01-ranking-loaded
# Ranking search button
- assertVisible:
    id: "랭킹 검색"
- takeScreenshot: store-02-search-btn
# Scroll ranking list
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- takeScreenshot: store-03-scrolled
# Tap ranking search to enter search
- tapOn:
    id: "랭킹 검색"
- waitForAnimationToEnd
- back
- waitForAnimationToEnd
- takeScreenshot: store-04-back
# Return to home
- tapOn:
    id: "tab-Home"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: store-05-back-home