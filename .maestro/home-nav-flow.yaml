appId: com.gonggu.wish
---
# Tab bar navigation E2E -- verify every tab is reachable and returns.
# Run: maestro test .maestro/home-nav-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
# Home must be visible -- wait for the search entry point (stable a11y label).
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
- takeScreenshot: nav-01-home
# Tap each tab by stable testID and assert the destination loaded.
- tapOn:
    id: "tab-Search"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: nav-02-search
- tapOn:
    id: "tab-Ranking"
- waitForAnimationToEnd
- assertVisible: "쇼핑몰 랭킹"
- takeScreenshot: nav-03-ranking
- tapOn:
    id: "tab-MyPage"
- waitForAnimationToEnd
- assertVisible: "마이페이지"
- takeScreenshot: nav-04-mypage
- tapOn:
    id: "tab-Home"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: nav-05-back-home