appId: com.gonggu.wish
tags:
  - e2e
  - calendar
  - activity-filter
---
# Calendar E2E -- collapsed month picker, full-page deals scroll, and activity filters.
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '쇼핑 홈'
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: home-calendar-open
    timeout: 15000
- tapOn:
    id: home-calendar-open
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: '공구 캘린더'
    timeout: 15000
- assertVisible:
    text: '전체 보기 선택됨'
- assertVisible:
    text: '북마크 선택 안 됨'
- assertVisible:
    text: '알림 선택 안 됨'
- assertNotVisible:
    text: '둘 다 보기'
- assertVisible:
    text: '공구 필터'
- takeScreenshot: calendar-01-header-filters

# Expand and collapse the month picker without changing the selected deals list.
- tapOn:
    id: calendar-month-toggle
- waitForAnimationToEnd
- assertVisible:
    id: calendar-grid
- takeScreenshot: calendar-02-calendar-expanded
- tapOn:
    id: calendar-month-toggle
- waitForAnimationToEnd
- assertNotVisible:
    id: calendar-grid

# Bookmark-only filter
- tapOn:
    text: '북마크'
- waitForAnimationToEnd
- assertVisible:
    text: '북마크 선택됨'
- assertVisible:
    text: '알림 선택 안 됨'
- takeScreenshot: calendar-02-bookmarked

# Notification-only filter
- tapOn:
    text: '알림'
- waitForAnimationToEnd
- assertVisible:
    text: '북마크 선택됨'
- assertVisible:
    text: '알림 선택됨'
- takeScreenshot: calendar-03-notified

# Turn bookmark off while keeping notification selected.
- tapOn:
    text: '북마크'
- waitForAnimationToEnd
- assertVisible:
    text: '북마크 선택 안 됨'
- assertVisible:
    text: '알림 선택됨'
- takeScreenshot: calendar-04-notified-only

# The header remains visible after the deals area is swiped.
- swipe:
    start: 50%,85%
    end: 50%,45%
    duration: 500
- waitForAnimationToEnd
- assertVisible:
    text: '공구 캘린더'
- assertVisible:
    text: '북마크 선택 안 됨'
- assertVisible:
    text: '알림 선택됨'
- takeScreenshot: calendar-05-header-after-scroll

# Clear activity filters.
- tapOn:
    text: '전체 보기'
- waitForAnimationToEnd
- assertVisible:
    text: '전체 보기 선택됨'
- takeScreenshot: calendar-06-all

# Return to the home screen using the in-screen back control.
- tapOn:
    text: '뒤로가기'
- waitForAnimationToEnd
- assertVisible:
    text: '쇼핑 홈'
- takeScreenshot: calendar-07-back-home
