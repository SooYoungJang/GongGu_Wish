appId: com.gonggu.wish
---
# Submit form E2E -- open form via home, verify fields, validation, attempt submit.
# Run: maestro test .maestro/submit-form-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# Scroll to find submit prompt
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 제보하기"
    timeout: 10000
- tapOn:
    id: "공구 제보하기"
- waitForAnimationToEnd
# Form header must be visible
- assertVisible: "발견한 공구를 알려주세요"
- takeScreenshot: submit-01-form-open
# Instagram URL field (hero input)
- assertVisible:
    id: "인스타그램 게시물 URL"
- tapOn:
    id: "인스타그램 게시물 URL"
- waitForAnimationToEnd
- inputText: "https://www.instagram.com/p/test123/"
- hideKeyboard
- waitForAnimationToEnd
- takeScreenshot: submit-02-instagram-filled
# Scroll down to see more fields
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- takeScreenshot: submit-03-more-fields
# Attempt submit with partial data -- should not crash
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "공구 제보하기"
    timeout: 5000
- tapOn:
    text: "공구 제보하기"
- waitForAnimationToEnd
- takeScreenshot: submit-04-attempt-submit
# Go back to home
- back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 10000
- takeScreenshot: submit-05-back-home