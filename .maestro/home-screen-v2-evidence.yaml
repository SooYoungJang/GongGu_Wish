appId: com.gonggu.wish
---
# HomeScreen header and promo banner evidence flow.
#
# Run with:
#   maestro test .maestro/home-screen-v2-evidence.yaml

- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "상품 검색"
    timeout: 15000
- waitForAnimationToEnd

- assertVisible:
    id: "home-shop-heading"
- assertVisible: "쇼핑 홈"
- assertNotVisible: "카테고리 탭"
- assertNotVisible: "특가 탭"
- assertNotVisible: "핫딜템 탭"
- assertNotVisible: "쿠팡템 탭"
- assertNotVisible: "여름생존템 탭"
- assertNotVisible: "알림 열기"
- assertNotVisible: "북마크 열기"
- assertVisible:
    id: "promo-start-date"
    text: '시작일 (확인 중|[0-9]{1,2}\.[0-9]{1,2})'
- assertVisible:
    id: "promo-end-date"
    text: '마감일 (확인 중|[0-9]{1,2}\.[0-9]{1,2})'
- takeScreenshot: ev-01-home-header-and-promo-dates

- assertVisible: "이번주 공구"
- assertVisible: "전체 캘린더 보기"
- takeScreenshot: ev-02-home-banner-layout
