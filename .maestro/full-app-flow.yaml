appId: com.gonggu.wish
---
# Full app E2E flow -- covers home, search, ranking, submit, my page.
# Run: maestro test .maestro/full-app-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# --- Home screen ---
- assertVisible:
    id: "공구 검색"
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- swipe:
    start: 50%,20%
    end: 50%,80%
    duration: 400
- waitForAnimationToEnd
- takeScreenshot: full-01-home
# --- Tab bar navigation: Search ---
- tapOn:
    id: "tab-Search"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: full-02-search
# --- Ranking tab ---
- tapOn:
    id: "tab-Ranking"
- waitForAnimationToEnd
- assertVisible: "쇼핑몰 랭킹"
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- takeScreenshot: full-03-ranking
# --- Submit entry from Home ---
- tapOn:
    id: "tab-Home"
- waitForAnimationToEnd
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 제보하기"
    timeout: 10000
- tapOn:
    id: "공구 제보하기"
- waitForAnimationToEnd
- assertVisible: "발견한 공구를 알려주세요"
- takeScreenshot: full-04-submit-form
- back
- waitForAnimationToEnd
# --- MY tab ---
- tapOn:
    id: "tab-MyPage"
- waitForAnimationToEnd
- assertVisible: "마이페이지"
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- takeScreenshot: full-05-mypage
# --- Back to home ---
- tapOn:
    id: "tab-Home"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: full-06-back-home