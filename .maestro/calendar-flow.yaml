appId: com.gonggu.wish
---
# Calendar screen E2E -- navigate to calendar, verify dates, tap a day.
# Run: maestro test .maestro/calendar-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# Open calendar from home weekly strip
- extendedWaitUntil:
    visible:
      id: "전체 캘린더 보기"
    timeout: 10000
- tapOn:
    id: "전체 캘린더 보기"
- waitForAnimationToEnd
# Calendar header shows year/month and weekday labels
- assertVisible:
    text: "월"
- assertVisible:
    text: "일"
- assertVisible:
    id: "이전 달"
- assertVisible:
    id: "다음 달"
- takeScreenshot: cal-01-grid
# Swipe to next month
- swipe:
    start: 20%,50%
    end: 80%,50%
    duration: 400
- waitForAnimationToEnd
- takeScreenshot: cal-02-next-month
# Swipe back
- swipe:
    start: 80%,50%
    end: 20%,50%
    duration: 400
- waitForAnimationToEnd
- takeScreenshot: cal-03-prev-month
# Tap a weekday header to verify it does not crash
- tapOn:
    text: "수"
    optional: true
- waitForAnimationToEnd
- back
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: cal-04-back-home