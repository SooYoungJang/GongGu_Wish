appId: com.gonggu.wish
---
# Calendar screen E2E -- navigate to calendar, verify today's action and date-grouped deals.
# Run: maestro test .maestro/calendar-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "상품을 검색해보세요"
    timeout: 60000
# Open calendar from home weekly strip
- extendedWaitUntil:
    visible:
      id: "home-calendar-open"
    timeout: 30000
- tapOn:
    id: "home-calendar-open"
- waitForAnimationToEnd
# Calendar header, today's action, and date-grouped deal list
- assertVisible:
    text: "공구 캘린더"
- assertVisible:
    text: "오늘의 공구"
- assertVisible:
    id: "calendar-today-button"
- tapOn:
    id: "calendar-today-button"
- waitForAnimationToEnd
- assertVisible:
    text: "오늘의 공구"
- takeScreenshot: cal-01-today
# Scroll through the date-grouped list
- swipe:
    start: 50%,80%
    end: 50%,30%
    duration: 400
- waitForAnimationToEnd
- takeScreenshot: cal-02-list-scroll
# Back returns to home without crashing
- back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "상품을 검색해보세요"
    timeout: 30000
- takeScreenshot: cal-04-back-home
