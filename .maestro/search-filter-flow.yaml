appId: com.gonggu.wish
---
# Search and filter E2E -- search input, clear, ranking filter.
# Run: maestro test .maestro/search-filter-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# Go to Search tab
- tapOn:
    id: "tab-Search"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: search-01-tab
# Tap search bar and type a query
- tapOn:
    id: "공구 검색"
- waitForAnimationToEnd
- inputText: "공구"
- hideKeyboard
- waitForAnimationToEnd
- takeScreenshot: search-02-query
# Clear search via the clear button
- extendedWaitUntil:
    visible:
      id: "검색어 지우기"
    timeout: 5000
- tapOn:
    id: "검색어 지우기"
- waitForAnimationToEnd
- takeScreenshot: search-03-cleared
# Go to Ranking and verify header
- tapOn:
    id: "tab-Ranking"
- waitForAnimationToEnd
- assertVisible: "쇼핑몰 랭킹"
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- takeScreenshot: search-04-ranking-scroll
# Back to home
- tapOn:
    id: "tab-Home"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: search-05-back-home