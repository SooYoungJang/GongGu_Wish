appId: com.gonggu.wish
---
# Search and filter E2E — search, apply filters, verify results.
# Run: maestro test .maestro/search-filter-flow.yaml

- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "공구"
    timeout: 15000

# Go to Search tab
- tapOn:
    text: "검색"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: search-01-opened

# Tap search bar
- tapOn:
    point: "50%,15%"
    optional: true
- inputText: "테스트"
- hideKeyboard
- waitForAnimationToEnd
- takeScreenshot: search-02-query

# Clear search
- back
- waitForAnimationToEnd

# Tap ranking tab
- tapOn:
    text: "랭킹"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: search-03-ranking

# Scroll ranking
- swipe:
    start: 50%,60%
    end: 50%,40%
    duration: 200
- waitForAnimationToEnd
- takeScreenshot: search-04-ranking-scroll

# Tap a category filter if visible
- tapOn:
    text: "뷰티"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: search-05-category

# Tap another category
- tapOn:
    text: "패션"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: search-06-category2

# Go back to home
- tapOn:
    text: "공구"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: search-07-home
