appId: com.gonggu.wish
---
# Reels screen E2E -- open reels tab, scroll feeds, go back.
# Run: maestro test .maestro/reels-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "쇼핑 홈"
    timeout: 60000
# Enter Reels tab
- tapOn:
    text: "릴스 탭"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "릴스 탭"
    timeout: 10000
- takeScreenshot: reels-01-opened
# Swipe up to next reel
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: reels-02-next
# Swipe up again
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: reels-03-next2
# Swipe down to previous
- swipe:
    start: 50%,20%
    end: 50%,80%
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: reels-04-prev
# Back to home
- tapOn:
    text: "홈 탭"
- waitForAnimationToEnd
- assertVisible:
    text: "쇼핑 홈"
- takeScreenshot: reels-05-back-home
