appId: com.gonggu.wish
---
# Reels screen E2E -- open reels tab, scroll feeds, go back.
# Run: maestro test .maestro/reels-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# Enter Reels tab
- tapOn:
    id: "tab-Reels"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "tab-Reels"
    timeout: 10000
- takeScreenshot: reels-01-opened
# Swipe up to next reel
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: reels-02-next
# Swipe up again
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: reels-03-next2
# Swipe down to previous
- swipe:
    start: 50%,20%
    end: 50%,80%
    duration: 500
- waitForAnimationToEnd
- takeScreenshot: reels-04-prev
# Back to home
- tapOn:
    id: "tab-Home"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: reels-05-back-home