appId: com.gonggu.wish
tags:
  - e2e
  - evidence
  - mobile
  - rn-home-category-filter
---
# Regression evidence for the horizontal, sticky home category filter.
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "상품 검색"
    timeout: 15000
- assertVisible: "상품 검색"
- assertNotVisible: "장수영님을 위한 추천 상품"
- assertVisible: "이번주 공구"
- takeScreenshot: rn-home-category-filter-01-top
- swipe:
    start: 50%,80%
    end: 50%,25%
    duration: 400
- waitForAnimationToEnd
- assertVisible: "전체 카테고리"
- assertVisible: "식품 카테고리"
- assertVisible: "뷰티 카테고리"
- tapOn: "뷰티 카테고리"
- waitForAnimationToEnd
- takeScreenshot: rn-home-category-filter-02-beauty
- tapOn: "전체 카테고리"
- waitForAnimationToEnd
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 600
- waitForAnimationToEnd
- assertVisible: "전체 카테고리"
- takeScreenshot: rn-home-category-filter-03-sticky
# The chip row is physically pinned at y≈140 on the 1080×1920
# Android evidence device. Tap its visible position, not the off-screen source.
- tapOn:
    point: "720,140"
- waitForAnimationToEnd
- takeScreenshot: rn-home-category-filter-04-sticky-beauty
