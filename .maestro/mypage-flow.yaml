appId: com.gonggu.wish
---
# My page E2E -- verify profile, sections, scroll.
# Run: maestro test .maestro/mypage-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# Go to MY tab
- tapOn:
    id: "tab-MyPage"
- waitForAnimationToEnd
- assertVisible: "마이페이지"
- takeScreenshot: mypage-01-loaded
# Section headers must be present
- assertVisible: "최근 본 공구"
- takeScreenshot: mypage-02-recent
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- assertVisible: "북마크한 공구"
- takeScreenshot: mypage-03-bookmarks
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- assertVisible: "알림 설정한 공구"
- takeScreenshot: mypage-04-alerts
# Scroll back to top
- swipe:
    start: 50%,20%
    end: 50%,80%
    duration: 400
- waitForAnimationToEnd
- swipe:
    start: 50%,20%
    end: 50%,80%
    duration: 400
- waitForAnimationToEnd
- assertVisible: "마이페이지"
- takeScreenshot: mypage-05-back-top
# Return to home
- tapOn:
    id: "tab-Home"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- takeScreenshot: mypage-06-back-home