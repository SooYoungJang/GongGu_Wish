appId: com.gonggu.wish
---
# No horizontal scroll E2E -- each screen scrolls vertically only, no h-scroll.
# Run: maestro test .maestro/no-hscroll-flow.yaml
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "공구 검색"
    timeout: 15000
# Home: vertical scroll only
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- waitForAnimationToEnd
- takeScreenshot: nohscroll-01-home-down
- swipe:
    start: 50%,20%
    end: 50%,80%
    duration: 400
- waitForAnimationToEnd
- takeScreenshot: nohscroll-02-home-up
# Search: vertical scroll only
- tapOn:
    id: "tab-Search"
- waitForAnimationToEnd
- assertVisible:
    id: "공구 검색"
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- takeScreenshot: nohscroll-03-search-down
# Ranking: vertical scroll only
- tapOn:
    id: "tab-Ranking"
- waitForAnimationToEnd
- assertVisible: "쇼핑몰 랭킹"
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- takeScreenshot: nohscroll-04-ranking-down
# MyPage: vertical scroll only
- tapOn:
    id: "tab-MyPage"
- waitForAnimationToEnd
- assertVisible: "마이페이지"
- swipe:
    start: 50%,80%
    end: 50%,20%
    duration: 400
- takeScreenshot: nohscroll-05-mypage-down
- tapOn:
    id: "tab-Home"
- waitForAnimationToEnd